services:
  db:
    image: m.daocloud.io/docker.io/library/postgres:16-alpine
    container_name: synclearn-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: synclearn
      POSTGRES_PASSWORD: synclearn
      POSTGRES_DB: synclearn
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - synclearn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synclearn"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: synclearn-app
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://synclearn:synclearn@db:5432/synclearn
      SECRET_KEY: change-this-in-production
      FLASK_ENV: production
      UPLOAD_FOLDER: /app/uploads
      FASTER_WHISPER_CACHE_DIR: /app/whisper_models
      PORT: "5000"
      TRANSCRIBE_USE_LOCAL_ONLY: "false"
      NO_PROXY: localhost,127.0.0.1,db
    volumes:
      - uploads:/app/uploads
      - whisper_models:/app/whisper_models
    ports:
      - "5000:5000"
    networks:
      - synclearn-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/courses"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      cache_from:
        - groupproject-team_7-web:latest
    container_name: synclearn-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      REACT_APP_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - synclearn-network
    stdin_open: true
    tty: true
    entrypoint: ["sh", "/app/entrypoint.sh"]

volumes:
  pgdata:
  uploads:
  whisper_models:

networks:
  synclearn-network:
    driver: bridge
